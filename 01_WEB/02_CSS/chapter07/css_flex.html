<!-- 문서의 유형 : html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .container {
        display: flex;
        background-color: gray;
        align-items: center;
        justify-content: center;
        /* 가로 중앙 정렬: center, 양끝에 붙이고 간격 동일: space-between, 여백을 동일하게: space-around */
        flex-direction: column;
        /* 세로로 배치 */
        gap: 30px;
        height: 300px;
      }

      .item {
        width: 100px;
        height: 100px;
        background-color: brown;
      }

      .item:first-child {
        flex-grow: 1;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="item">카드1</div>
      <div class="item">카드2</div>
      <div class="item">카드3</div>
    </div>
  </body>
</html>
