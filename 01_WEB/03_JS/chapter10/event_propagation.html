<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div style="width: 500px; height: 300px; background-color: yellow">
      <a href="https://kbstar.com">KB</a>
    </div>

    <script>
      //DOM 트리에서 a 객체 찾기
      //a객체에서 click이벤트가 발생하면 배경색을 red로 변경, kbstar.com으로 이동하지 않는다
      //a객체에서 click 기본이벤트핸들러: href속성값에 해당하는 URL로 요청
      const a = document.querySelector("a"); // a[href="https://kbstar.com"]

      //   a.addEventListener("click", function (e) {
      //     a.style.backgroundColor = "red";
      //     e.preventDefault(); //기본 이벤트 핸들러 막기
      //     e.stopPropagation(); //부모쪽으로 이벤트가 전파되는 것을 중지

      //     console.log(this);
      //   });

      a.addEventListener("click", (e) => {
        // window 객체가 this
        this.style.backgroundColor = "red";
        e.preventDefault(); //기본 이벤트 핸들러 막기
        // e.stopPropagation(); //부모쪽으로 이벤트가 전파되는 것을 중지

        console.log(this);
      });

      // 실무에서는 this 별로 권장 X

      //DOM트리에서 div객체 찾기
      //div객체에서 click이벤트가 발생하면 배경색을 green으로 변경
      const divObj = document.querySelector("div");
      divObj.addEventListener("click", function () {
        divObj.style.backgroundColor = "green";
        console.log("--- div객체 ----");
        console.log(this);
        console.log(e.target);
        console.log(e.currentTarget);
      });
    </script>
  </body>
</html>
