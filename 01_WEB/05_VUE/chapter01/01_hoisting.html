<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>호이스팅 실습</title>

    <script>
      // 호이스팅은 코드를 실행하기 전에 변수와 함수의 선언을 최상단으로 끌어올리는 것. 단, undefined 자료형이 됨
      // 호이스팅의 불편함을 해결하려고 ES6에서 let, const가 제공됨
      //   console.log(a); a is not defined

      console.log(a); // 호출 -> 선언시 undefined 출력됨
      var a; // 선언

      console.log(b); // 호출 후 선언 -> undefined: hoisting
      var b = "hello"; // 선언

      console.log(b); // 선언 후 다시 호출 -> hello

      // 함수의 호이스팅
      // 1) 이름 있는 함수: 값이 대입되지 않은 형태로 올라가고 undefined 자료형으로도 연결하지 않으므로 함수를 먼저 호출하는 것이 불가 > 에러 발생
      f1(); // 호풓
      function f1() {
        console.log("f1함수 입니다.");
      } // 나중에 선언되었지만 최상단으로 끌어올려서 f1함수가 호출이 될 수 있음

      // 2) 이름 없는 함수 (anoymous funciton)
      f2();
      const f1 = function () {
        console.log("f2함수 입니다.");
      };
    </script>
  </head>
  <body></body>
</html>
