<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .buttonColor {
        /* 배경색 아쿠아 */
        background-color: aqua;
        /* 글자색 검정 */
        color: black;
      }
      .buttonLayout {
        /* 텍스트 중앙 정렬 */
        text-align: center;
        /* 폭 120px */
        margin: 120px;
      }
      .staticBorder {
        /* 경계선 카키색 점선 굵기 1px */
        border: khaki dashed 1px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <button class="staticBorder" :class="myColor">테스트 버튼</button>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script type="text/javascript">
      var vm = Vue.createApp({
        name: "App",
        data() {
          return {
            myColor: "buttonColor buttonLayer",
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
