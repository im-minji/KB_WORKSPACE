<!-- form.html -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Page Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" media="screen" href="main.css" />
    <script src="main.js"></script>
  </head>
  <body>
    <div id="html5">
      <h1>HTML5버전에 포함된 입력양식용 속성들</h1>
      <form autocomplete="off">
        <fieldset>
          <legend>한줄입력란</legend>
          <input type="text" name="test" value="t" />
        </fieldset>
        <fieldset>
          <img src="../images/icons8-numbers-input-form-50.png" alt="숫자" />
          <input type="number" name="t4" value="5" min="1" max="10" />
        </fieldset>
        <fieldset>
          <img src="../images/icons8-email-50.png" alt="이메일" />
          <input type="email" placeholder="필수입력항목입니다" required />
        </fieldset>
        <fieldset>
          <img src="../images/icons8-phone-50.png" alt="전화기" />
          <input type="tel" value="010" />
        </fieldset>
        <fieldset>
          <img src="../images/icons8-calendar-50.png" alt="달력" />
          <input type="date" />
        </fieldset>
        <fieldset>
          <img src="../images/icons8-search-50.png" alt="돋보기" /><input
            type="search"
            placeholder="검색어를 입력하세요"
          />
        </fieldset>
        <input type="button" value="일반버튼" />
        <input type="submit" value="제출" />
        <input type="reset" value="리셋" />
      </form>
    </div>
  </body>
</html>
