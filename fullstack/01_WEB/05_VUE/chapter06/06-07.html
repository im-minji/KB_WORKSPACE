<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .buttonColor {
        background-color: aqua;
        color: black;
      }
      .buttonLayout {
        text-align: center;
        width: 120px;
      }
      .staticBorder {
        border: khaki dashed 1px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- 
        v-model="isMyLayout": 양방향 데이터 바인딩. 
        체크박스의 선택 상태(true/false)를 데이터 모델인 isMyLayout 변수와 실시간으로 동기화합니다.
      -->
      <input type="checkbox" v-model="isMyLayout" />
      레이아웃 적용 여부<br />

      <!-- 
        :class="[... , isMyLayout ? myLayout : '']": 3항 연산자를 사용한 조건부 클래스 바인딩.
        isMyLayout이 true이면 myLayout 변수에 저장된 'buttonLayout' 클래스를 추가하고,
        false이면 빈 문자열('')을 반환하여 아무 클래스도 추가하지 않습니다.
      -->
      <button
        class="staticBorder"
        :class="[myColor, isMyLayout ? myLayout: '']"
      >
        버튼
      </button>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: "App",
        data() {
          return {
            myColor: "buttonColor", // 항상 적용될 색상 관련 클래스명
            myLayout: "buttonLayout", // 조건에 따라 적용될 레이아웃 관련 클래스명
            isMyLayout: false, // 체크박스의 상태를 저장하는 변수 (기본값: false)
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
