<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>클로저</title>

    <script>
      // 함수가 선언될 당시의 외부 스코프를 기억해서, 해당 함수가 외부에서 호출 되더라도
      // 그 환경에 계속 접근할 수 있다.
      function createCount() {
        let count = 0; // let으로 선언한 변수는 블록 단위로 수명을 가짐 (블록 내에서만 사용 가능)
        // 데이터 은닉 효과
        return function () {
          count++; // 외부함수 count 접근 + 증가
          return count;
        };
      }

      const result = createCount();
      //   result();
      console.log(result());
      console.log(result());
    </script>
  </head>
  <body></body>
</html>
