<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>회원가입</legend>

        <table>
          <tr>
            <td><label for="userid">사용자 ID</label></td>
            <td><input type="text" id="userid" name="userid" /></td>
          </tr>
          <tr>
            <td><label for="pw">비밀번호</label></td>
            <td><input type="password" id="pw" name="password" /></td>
          </tr>
          <tr>
            <td><label for="pwcheck">비밀번호 확인</label></td>
            <td><input type="password" id="pwcheck" name="pwcheck" /></td>
          </tr>
          <tr>
            <td><label for="username">이름</label></td>
            <td><input type="text" id="username" name="username" /></td>
          </tr>
          <tr>
            <td>성별</td>
            <td>
              <input type="radio" id="man" name="gender" value="m" /><label
                for="man"
                >남</label
              >
              <input type="radio" id="woman" name="gender" value="w" /><label
                for="woman"
                >여</label
              >
            </td>
          </tr>
          <tr>
            <td>취미</td>
            <td>
              <input
                type="checkbox"
                id="soccer"
                name="hobby"
                value="soccer"
              /><label for="soccer">축구</label>
              <input
                type="checkbox"
                id="baseball"
                name="hobby"
                value="baseball"
              /><label for="baseball">야구</label>
              <input
                type="checkbox"
                id="volleyball"
                name="hobby"
                value="volleyball"
              /><label for="volleyball">배구</label>
              <input
                type="checkbox"
                id="basketball"
                name="hobby"
                value="basketball"
              /><label for="basketball">농구</label>
            </td>
          </tr>

          <tr>
            <td><label for="email">email</label></td>
            <td><input type="email" id="email" name="email" /></td>
          </tr>

          <tr>
            <td>역할</td>
            <td>
              <select name="role" id="role">
                <option value="admin">ADMIN</option>
                <option value="manager">관리자</option>
                <option value="public">일반회원</option>
              </select>
            </td>
          </tr>
        </table>
        <input type="submit" value="확인" />
        <input type="reset" value="다시쓰기" />
      </fieldset>
    </form>
  </body>
</html>
