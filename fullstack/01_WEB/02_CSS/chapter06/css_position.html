<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* y: absolute r: absoulte, relative는 동일 */
      /* y: relative, r: absoulte는 y: absolute, r: absolute, relative와 동일 */
      /* Y: relative, r: relative 다음 요소에 영향을 미침 -> 포지션은 조심해서 사용해야함 */
      .y {
        background-color: yellow;
        width: 400px;
        height: 400px;
        position: relative;
        top: 100px;
        left: 200px;
        overflow: auto;
        /* 넘치는 거 자르는 건: hidden, scroll을 넘칠 때만 만드는 것은 auto */
      }
      .r {
        background-color: red;
        /* position: absolute; */
        position: relative;
        top: 300px;
        left: 300px;
      }
      .g {
        background-color: green;
      }
      .b {
        background-color: blue;
      }
      .r,
      .g,
      .b {
        width: 150px;
        height: 150px;
      }
    </style>
  </head>
  <body>
    <div class="y">
      YELLOW
      <div class="r">RED</div>
      <div class="g">GREEN</div>
      <div class="b">BLUE</div>
    </div>
  </body>
</html>
