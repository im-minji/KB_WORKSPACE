<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- 1, 2, 3, 4 순서대로 자바스크립트가 실행됨 -->
    <!-- 4는 위치상 맨 위이지만 load가 될때까지 기다렸다가 이벤트 발생 -->
    <script>
      // window 객체의 load 이벤트는 DOM이 완성되고, 모든 리소스가 준비된 상태에서 발생
      window.addEventListener("load", function () {
        // load이벤트가 발생하면 callback 함수를 실행해라
        alert(4);
      });

      //   window.onload = function(){}와 같음
      alert("1");
    </script>
  </head>
  <body>
    <script>
      alert(2);
    </script>
    <div>DIV</div>
    <script>
      alert(3);
    </script>
  </body>
</html>
