<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script>
      window.addEventListener("load", function () {
        const foods = document.querySelectorAll('input[name="food"]');

        const btn = document.getElementById("btn");
        btn.addEventListener("click", function () {
          let selectedFoods = [];
          for (let i = 0; i < foods.length; i++) {
            let food = foods[i];

            if (food.checked) // checked라면
            {
              selectedFoods.push(food.value);
            }
          }
          console.log(selectedFoods);
        });
      });
    </script>
  </head>
  <body>
    <form>
      <div>
        좋아하는 음식은?
        <label><input type="checkbox" name="food" value="라면" /> 라면</label>
        <label><input type="checkbox" name="food" value="만두" /> 만두</label>
        <label
          ><input type="checkbox" name="food" value="불고기" /> 불고기</label
        >
        <input id="btn" type="button" value="전송" />
      </div>
    </form>
  </body>
</html>
