<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>이벤트 전파</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <div style="width: 500px; height: 300px; background-color: yellow">
      <a href="https://kbstar.com">KB</a>
    </div>
    <script>
      //DOM트리에서 a객체찾기
      //a객체에서 click이벤트가 발생하면 배경색을 red로 변경, kbstar.com으로 이동하지 않는다
      //a객체의 click 기본이벤트핸들러 : href속성값에 해당하는 URL로 요청
      const aObj = document.querySelector('a[href="https://kbstar.com"]');
      //   aObj.addEventListener('click', function (e) {
      //     this.style.backgroundColor = 'red';
      //     e.preventDefault(); //기본이벤트핸들러 막기
      //     e.stopPropagation(); //부모쪽으로 이벤트가 전파되는 것을 중지

      //     console.log(this);
      //   });

      aObj.addEventListener('click', (e) => {
        e.preventDefault(); //기본이벤트핸들러 막기
        // e.stopPropagation(); //부모쪽으로 이벤트가 전파되는 것을 중지

        console.log(this);
      });

      //   aObj.onclick = function(){}

      //DOM트리에서 div객체찾기
      //div객체에서 click이벤트가 발생하면 배경색을 green으로 변경
      const divObj = document.querySelector('div');
      divObj.addEventListener('click', function (e) {
        divObj.style.backgroundColor = 'green';
        console.log('--- div객체 --');
        console.log(this);
        console.log(e.target);
        console.log(e.currentTarget);
      });
    </script>
  </body>
</html>
