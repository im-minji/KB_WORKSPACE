<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" href="images/favicon.ico" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #ffffff;
        font-family: "Noto Sans KR", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .signup-container {
        max-width: 450px;
        width: 100%;
        padding: 40px 20px;
      }
      .signup-title {
        font-weight: 700;
        color: #333;
        margin-bottom: 2rem;
      }
      .form-control:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
      }
      .btn-primary {
        font-weight: 600;
        padding: 0.5rem 1rem;
      }
      .btn-outline-secondary {
        font-weight: 600;
        padding: 0.5rem 1rem;
      }
      .iddupchk-msg {
        font-size: 0.875rem;
        margin-top: 0.25rem;
      }
    </style>
  </head>
  <body>
    <div id="app" class="signup-container">
      <h2 class="signup-title text-center">회원가입</h2>
      <form @submit.prevent="joinSubmit">
        <!-- 아이디 입력 -->
        <div class="mb-3">
          <label for="id" class="form-label">아이디</label>
          <div class="input-group">
            <input
              type="text"
              class="form-control"
              v-model="person.userId"
              id="id"
              name="id"
              placeholder="아이디 입력"
              @focus="$event.target.select()"
              @input="isIdChecked = false; message = '';"
            />
            <button
              class="btn btn-outline-primary"
              type="button"
              @click="checkId"
            >
              중복확인
            </button>
          </div>
          <div
            v-if="message"
            :class="['iddupchk-msg', isIdChecked ? 'text-success' : 'text-danger']"
          >
            {{ message }}
          </div>
        </div>

        <!-- 비밀번호 입력 -->
        <div class="mb-3">
          <label for="pw" class="form-label">비밀번호</label>
          <input
            type="password"
            class="form-control"
            id="pw"
            name="pw"
            v-model="person.userPw"
            placeholder="비밀번호 입력"
          />
        </div>

        <!-- 비밀번호 확인 -->
        <div class="mb-3">
          <label for="pwcheck" class="form-label">비밀번호 확인</label>
          <input
            type="password"
            class="form-control"
            id="pwcheck"
            v-model="userPwCheck"
            placeholder="비밀번호 재입력"
          />
          <div
            v-if="person.userPw && userPwCheck"
            :class="['iddupchk-msg', person.userPw === userPwCheck ? 'text-success' : 'text-danger']"
          >
            {{ person.userPw === userPwCheck ? '✓ 비밀번호가 일치합니다' : '✗
            비밀번호가 일치하지 않습니다' }}
          </div>
        </div>

        <!-- 이메일 입력 -->
        <div class="mb-4">
          <label for="email" class="form-label">이메일</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            v-model="person.userEmail"
            placeholder="example@email.com"
          />
        </div>

        <!-- 버튼 영역 -->
        <div class="d-grid gap-2">
          <button
            v-if="isIdChecked"
            type="submit"
            class="btn btn-primary btn-lg rounded-pill"
          >
            가입하기
          </button>
          <button
            type="reset"
            class="btn btn-outline-secondary btn-lg rounded-pill"
            @click="resetForm"
          >
            초기화
          </button>
        </div>
      </form>
    </div>

    <!-- Vue.js CDN -->
    <script src="https://unpkg.com/vue"></script>
    <script>
      Vue.createApp({
        name: "App",
        data() {
          return {
            person: {
              userId: "",
              userPw: "",
              userEmail: "",
            },
            userPwCheck: "",
            message: "",
            isIdChecked: false,
          };
        },
        methods: {
          async checkId() {
            if (!this.person.userId) {
              alert("아이디를 입력해주세요");
              return;
            }

            // const url = `http://localhost:3000/iddupchk?id=${this.person.userId}`;
            const url = `http://localhost:3000/iddupchk/${this.person.userId}`;

            try {
              const response = await fetch(url);
              if (response.status === 200) {
                this.message = "사용 가능한 아이디입니다.";
                this.isIdChecked = true;
              } else {
                this.message = "이미 사용 중인 아이디입니다.";
                this.isIdChecked = false;
              }
            } catch (err) {
              console.error("네트워크 오류:", err);
              alert("서버와 통신할 수 없습니다.");
            }
          },

          async joinSubmit() {
            const { userId, userPw, userEmail } = this.person;

            if (!this.isIdChecked || !userId) {
              alert("아이디 중복 확인을 먼저 진행해주세요.");
              return;
            }
            if (!userPw || !this.userPwCheck) {
              alert("비밀번호를 입력해주세요");
              return;
            }
            if (userPw !== this.userPwCheck) {
              alert("비밀번호가 일치하지 않습니다.");
              return;
            }
            if (!userEmail) {
              alert("이메일을 입력해주세요");
              return;
            }

            const url = "http://localhost:3000/signup";
            const jsonStr = JSON.stringify(this.person);
            const requestInit = {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: jsonStr,
            };

            try {
              const response = await fetch(url, requestInit);
              if (response.ok) {
                const result = await response.text();
                alert("성공: " + result);
                console.log("가입 데이터:", this.person);
              } else {
                alert("서버 에러가 발생했습니다.");
              }
            } catch (error) {
              console.error("통신 에러:", error);
              alert("서버와 통신할 수 없습니다.");
            }
          },
          resetForm() {
            this.person = { userId: "", userPw: "", userEmail: "" };
            this.userPwCheck = "";
            this.message = "";
            this.isIdChecked = false;
          },
        },
      }).mount("#app");
    </script>
  </body>
</html>
