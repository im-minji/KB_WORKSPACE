<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>가입</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      window.addEventListener("load", function () {
        //DOM트리에서 type속성값이 button인 input객체찾기
        const btDupchkObj = document.querySelector("input[type=button]");
        btDupchkObj.addEventListener("click", function () {
          //DOM트리에서 id속성값이 "id"인 객체 찾기
          const idObj = document.querySelector("#id");
          //객체의 value프로퍼티 : idObj.value

          //   alert(`${idObj.value} 는 사용 가능한 아이디입니다`);
          //DOM트리에서 class속성값이 iddupchk 객체찾기
          const spanDupchkObj = document.querySelector(".iddupchk");
          spanDupchkObj.innerHTML = `${idObj.value} 는 사용 가능한 아이디입니다`;
        });

        //submit버튼이 클릭되면 click이벤트 발생 ->
        // submit버튼이 포함된 form의 submit이벤트 자동 발생 ->
        // submit이벤트의 기본핸들러 : form의 action속성값에 해당하는 URL로 자동 전송됨
        // 기본핸들러를 막기 : e.preventDefault();

        //DOM트리에서 type속성값이 submit인 input객체찾기

        const submitObj = document.querySelector("input[type=submit]");
        submitObj.addEventListener("click", function () {
          alert("submit버튼이 클릭됨");
        });
        //DOM트리에서 class속성값이 signup인 form객체 찾기
        const formObj = document.querySelector("form.signup");
        formObj.addEventListener("submit", function (e) {
          e.preventDefault(); //이벤트의 기본핸들러를 막기
          // alert('폼이 전송됨');

          //비밀번호값과 비밀번호확인값이 다른 경우 "비밀번호가 서로 다릅니다"라는 alert창 띄우기
          const pwd1Obj = document.querySelector("#pwd");
          const pwd2Obj = document.querySelector("#pwd2");
          if (pwd1Obj.value !== pwd2Obj.value) {
            alert("비밀번호가 서로 다릅니다");
            return false;
          }
          //정상입력된 경우
          this.method = "post";
          this.action = "http://localhost:3000/signup";
          this.submit();
        });
      });
    </script>
  </head>
  <body>
    <form class="signup">
      <label for="id">아이디 : </label>
      <input type="text" id="id" name="id" required />
      <input type="button" value="아이디중복확인" />
      <span class="iddupchk"> </span>
      <br />
      <label for="pwd">비밀번호 :</label
      ><input type="password" id="pwd" name="pwd1" required /><br />
      <label for="pwd2">비밀번호확인: </label
      ><input type="password" id="pwd2" required /><br />
      <label for="e">이메일 :</label
      ><input type="email" id="e" name="email" required /><br />

      <input type="submit" value="가입" />
      <input type="reset" value="초기화" />

      <button>가입</button
      ><!-- type="submit"효과-->
      <button type="reset">초기화</button>
    </form>

    <button>일반버튼</button>
    <!-- type="button"효과-->
  </body>
</html>
