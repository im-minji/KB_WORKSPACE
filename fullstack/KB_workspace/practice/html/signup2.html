<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join</title>
    <link rel="stylesheet" href="./css/join.css" />
    <!-- tab에서 보이는 이미지 (파비콘) -->
    <link rel="icon" href="images/favicon.ico" />
    <!--브라우저 스타일 초기화-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reset-css@5.0.1/reset.min.css"
    />

    <!-- 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <script>
      window.addEventListener("load", function () {
        //DOM Tree에서 type 속성값이 button인 input 객체 찾기
        const btDupchkObj = document.querySelector("input[type=button]");
        btDupchkObj.addEventListener("click", function () {
          // DOM 트리에서 id속성값이 id인 객체 찾기
          const idObj = document.querySelector("#id");
          // 객체의 value 프로퍼티: idObj.value

          //
          const spanDupchkObj = document.querySelector(".iddupchk");
          spanDupchkObj.innerHTML = `${idObj.value} 는 사용 가능한 아이디입니다`;
          // alert("사용가능한 아이디입니다.");
        });

        //submit 버튼이 클릭되면 click event 발생 -> submit 버튼이 포함된 폼의 submit이벤트 자동 발생 ->
        //form의 action 속성 값에 해당하는 URL로 자동 전송됨

        const submitObj = document.querySelector("input[type=submit]");
        submitObj.addEventListener("click", function () {
          const pwdObj = document.querySelector("#pw");
          const pwdchkObj = document.querySelector("#pwcheck");

          if (pwdObj.value != pwdchkObj.value) {
            alert("비밀번호가 서로 다릅니다");
          }
        });

        const formObj = document.querySelector("form.signup");
        formObj.addEventListener("submit", function (e) {
          e.preventDefault(); //이벤트의 기본 핸들러 막기
          // alert("form이 전송됨");

          const pwdObj = document.querySelector("#pw");
          const pwdchkObj = document.querySelector("#pwcheck");

          if (pwdObj.value != pwdchkObj.value) {
            alert("비밀번호가 서로 다릅니다");
            return false;
          }

          //this로 해도 같은 결과일 것
          formObj.method = "post";
          formObj.action = "https://kbstar.com";
          formObj.submit();
        });
        // 비밀번호값과 비밀번호 확인값이 다른 경우 "비밀번호가 서로 다릅니다" 라는 alert창 띄우기
      });
    </script>
  </head>
  <body>
    <form class="signup">
      <label for="id">아이디: </label
      ><input type="text" id="id" name="id" required />
      <input type="button" value="아이디 중복확인" />

      <span class="iddupchk"></span>
      <br />

      <label for="pw">비밀번호: </label
      ><input type="password" id="pw" name="pw" required />
      <br />

      <label for="pwcheck">비밀번호확인: </label
      ><input type="password" id="pwcheck" required />
      <br />

      <label for="email">email: </label
      ><input type="email" id="email" name="email" required />
      <br />

      <input type="submit" value="가입" />
      <input type="reset" value="초기화" />

      <!-- <button>가입</button> -->
      <!-- form 태그 내에 버튼을 만들면 type='submit' 태그 밖에 만들면 type="button" 효과-->
      <!-- <button type="reset">초기화</button> -->
    </form>
  </body>
</html>
